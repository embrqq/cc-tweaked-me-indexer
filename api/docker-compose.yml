services:
  app:
    build: .
    ports:
      - "8080:8080"
    command: python main.py
    environment:
      - DEBUG=${DEBUG:-}
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-notsecret}

    depends_on:
      - db
    volumes:
      - ./src:/api/src

  db:
    image: postgres
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-postgres}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-notsecret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
volumes:
  postgres_data:
